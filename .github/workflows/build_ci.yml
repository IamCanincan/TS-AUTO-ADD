name: Build CI Module

on:
  push:
    branches: [ "main" ]
    paths:
      - 'module/**' # 限制仅在 module 目录下的文件发生变动时触发
  pull_request:
    branches: [ "main" ]
    paths:
      - 'module/**'
  workflow_dispatch: # 支持手动触发工作流

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Dynamic Properties Injection
        id: version_info
        run: |
          export TZ="Asia/Shanghai"
          TIME_SUFFIX=$(date +'%Y%m%d%H%M%S')
          NEW_VERSION_CODE=$(date +'%Y%m%d%H%M%S')

          PROP_FILE="module/module.prop"

          # 解析并清理 module.prop 中的 id 和 version 字段
          MOD_ID=$(grep '^id=' "$PROP_FILE" | cut -d= -f2 | tr -d '\r ')
          ORIGINAL_VERSION=$(grep '^version=' "$PROP_FILE" | cut -d= -f2 | tr -d '\r ')
          
          NEW_VERSION="${ORIGINAL_VERSION}-${TIME_SUFFIX}-ci"

          echo "=========================================="
          echo "原始版本名: $ORIGINAL_VERSION"
          echo "注入版本名: $NEW_VERSION"
          echo "注入版本号: $NEW_VERSION_CODE"
          echo "=========================================="

          # 更新 version 属性：存在则替换，不存在则追加
          if grep -q '^version=' "$PROP_FILE"; then
            sed -i "s/^version=.*/version=${NEW_VERSION}/" "$PROP_FILE"
          else
            echo "version=${NEW_VERSION}" >> "$PROP_FILE"
          fi

          # 更新 versionCode 属性：存在则替换，不存在则追加
          if grep -q '^versionCode=' "$PROP_FILE"; then
            sed -i "s/^versionCode=.*/versionCode=${NEW_VERSION_CODE}/" "$PROP_FILE"
          else
            echo "versionCode=${NEW_VERSION_CODE}" >> "$PROP_FILE"
          fi

          # 设置步骤输出供后续 Step 调用
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "mod_id=${MOD_ID}" >> $GITHUB_OUTPUT

      - name: Pack Module to Zip
        run: |
          cd module
          # 切换至目录内部打包以保持正确的目录级结构，并排除内部 zip 文件
          zip -r ../${{ steps.version_info.outputs.mod_id }}-${{ steps.version_info.outputs.version }}.zip . -x "*.zip"
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version_info.outputs.mod_id }}-${{ steps.version_info.outputs.version }}
          # 精确指定上传的文件路径，不使用通配符
          path: ${{ steps.version_info.outputs.mod_id }}-${{ steps.version_info.outputs.version }}.zip
          retention-days: 30