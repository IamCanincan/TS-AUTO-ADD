name: Build TS-AUTO-ADD Module

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Parse Module Version
      id: get_version
      run: |
        PROP_FILE="./module/module.prop"
        if [ -f "$PROP_FILE" ]; then
          VERSION=$(sed -n 's/^version=//p' "$PROP_FILE" | tr -d '[:space:]')
        fi
        if [ -z "$VERSION" ]; then
          VERSION=$(date +'%Y.%m.%d-%H%M')
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Inject META-INF & Compress Module
      run: |
        cd module
        
        # 创建 META-INF 路径
        mkdir -p META-INF/com/google/android
        
        # 使用单行 echo 写入引导脚本，完全避开多行语法冲突
        echo '#!/bin/sh' > META-INF/com/google/android/update-binary
        echo 'exec sh "$3/customize.sh" "$1" "$2" "$3"' >> META-INF/com/google/android/update-binary
        chmod +x META-INF/com/google/android/update-binary
        echo "dummy" > META-INF/com/google/android/updater-script

        # 打包并移动到上级目录
        ZIP_NAME="TS-AUTO-ADD-${{ steps.get_version.outputs.VERSION }}.zip"
        zip -r "../$ZIP_NAME" ./*
        
        cd ..
        rm -rf module/META-INF
        md5sum "$ZIP_NAME" > "$ZIP_NAME".md5

    - name: Archive Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TS-AUTO-ADD-${{ steps.get_version.outputs.VERSION }}
        path: |
          *.zip
          *.md5

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/heads/main')
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: TS-AUTO-ADD ${{ steps.get_version.outputs.VERSION }}
        body: |
          ### Automated Build Environment
          - **Module Version**: `${{ steps.get_version.outputs.VERSION }}`
          - **Compatibility**: KernelSU / Magisk / APatch
        files: |
          *.zip
          *.md5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
